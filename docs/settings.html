<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings · Bramblewood Care</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <p class="brand">Bramblewood<span>Care</span></p>
    <nav class="primary" aria-label="Main navigation">
      <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="residents.html">Residents</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="card" aria-labelledby="settings-heading">
      <h2 id="settings-heading">Settings</h2>

      <div class="toggle-row">
        <span id="opt-notifications">Push notifications</span>
        <button role="switch" aria-checked="true" aria-labelledby="opt-notifications" class="btn secondary">On</button>
      </div>
      <div class="toggle-row">
        <span id="opt-darkmode">Dark mode</span>
        <button role="switch" aria-checked="false" aria-labelledby="opt-darkmode" class="btn secondary">Off</button>
      </div>
      <div class="toggle-row">
        <span id="opt-digest">Weekly email digest</span>
        <button role="switch" aria-checked="false" aria-labelledby="opt-digest" class="btn secondary">Off</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
